# Generated by python -m tools.generate_workflow --pipeline geektime-he
# Source config: pipelines/geektime-he.yaml
name: geektime-he

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7,9,11,13,15,17,19,21,23 * * *'
      timezone: "Asia/Jerusalem"

permissions:
  contents: read
  id-token: write

jobs:
  run-pipeline:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: geektime-he
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          project_id: '${{ vars.GCP_PROJECT_ID }}'
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ vars.GCP_WIF_POOL_ID }}/providers/${{ vars.GCP_WIF_PROVIDER_ID }}'
          service_account: '${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}'
          create_credentials_file: true
          export_environment_variables: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run selected pipeline
        id: run_pipeline
        shell: bash
        env:
          CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}
          CF_KV_NAMESPACE_ID: ${{ vars.CF_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          set +e
          mkdir -p out/logs
          log_file="out/logs/geektime-he.log"
          python3 run_feed.py "geektime" 2>&1 | tee "$log_file"
          exit_code="${PIPESTATUS[0]}"
          echo "log_file=$log_file" >> "$GITHUB_OUTPUT"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Summarize failure
        if: failure()
        shell: bash
        run: |
          {
            echo "### Pipeline failure"
            echo ""
            echo "- Pipeline: geektime-he"
            echo "- Exit code: ${{ steps.run_pipeline.outputs.exit_code }}"
            echo "- Log file: ${{ steps.run_pipeline.outputs.log_file }}"
            echo ""
            echo '```text'
            tail -n 80 "${{ steps.run_pipeline.outputs.log_file }}" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
