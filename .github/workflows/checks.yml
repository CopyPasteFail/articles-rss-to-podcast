name: Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Bytecode compilation check
        run: |
          python -m compileall -q . \
            -x '(^|/)(\.git|\.venv|node_modules|out|__pycache__|\.pytest_cache|\.wrangler)(/|$)'

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Ruff lint
        run: python -m ruff check .

      - name: Pyright
        run: pyright

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q
          pytest_exit_code="$?"
          set -e

          if [[ "$pytest_exit_code" -ne 0 && "$pytest_exit_code" -ne 5 ]]; then
            exit "$pytest_exit_code"
          fi

          if [[ "$pytest_exit_code" -eq 5 ]]; then
            echo "pytest collected no tests; continuing."
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Bandit
        run: |
          python -m bandit -q -r . \
            -x ./tests,./.venv,./node_modules,./out,./.git,./.wrangler,./typings

      - name: Pip audit
        run: python -m pip_audit -r requirements.txt

      - name: Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            docker.io/zricethezav/gitleaks:v8.22.1 \
            detect --source . --no-banner --redact
